<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5856D6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34C759;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AF52DE;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#1a1a2e"/>

  <!-- Focus ring icon — scaled up version of logo -->
  <g transform="translate(300, 200)">
    <circle cx="120" cy="120" r="95" stroke="url(#ring)" stroke-width="14" fill="none" opacity="0.9"/>
    <circle cx="120" cy="120" r="65" stroke="url(#ring)" stroke-width="7" fill="none" opacity="0.5"/>
    <circle cx="120" cy="120" r="20" fill="url(#grad)"/>
    <!-- Crosshair lines -->
    <line x1="120" y1="5" x2="120" y2="45" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="120" y1="195" x2="120" y2="235" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="5" y1="120" x2="45" y2="120" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="195" y1="120" x2="235" y2="120" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Text — same layout as logo, scaled up -->
  <text x="580" y="290" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="72" font-weight="700" fill="url(#grad)">Swift FocusEngine</text>
  <text x="580" y="370" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="56" font-weight="500" fill="url(#grad)">Pro</text>
  <text x="680" y="370" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="400" fill="#86868B">Agent Skill</text>
</svg>
